name: CarbonIQ CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    name: Code Quality & Type Safety
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install Root Dependencies
      run: npm install --legacy-peer-deps --ignore-scripts

    - name: Install Backend Dependencies
      run: cd backend && npm install --legacy-peer-deps

    - name: Install Frontend Dependencies
      run: cd frontend && npm install --legacy-peer-deps

    - name: Type Check (Backend)
      run: cd backend && npx tsc --noEmit

    - name: Type Check (Frontend)
      run: cd frontend && npx tsc --noEmit

    - name: Lint (Backend)
      run: cd backend && npm run lint

    - name: Lint (Frontend)
      run: cd frontend && npm run lint

  backend-tests:
    name: Backend Tests (Coverage > 90%)
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Dependencies
      run: cd backend && npm install --legacy-peer-deps

    - name: Run Unit & Integration Tests
      run: cd backend && npm run test:ci
      env:
        NODE_ENV: test
        DATABASE_URL: postgresql://test:test@localhost:5432/test
        JWT_SECRET: test-secret-key-for-ci-minimum-length
        JWT_REFRESH_SECRET: test-refresh-secret-key-for-ci-minimum

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: backend-coverage
        path: backend/coverage/
        retention-days: 15

  frontend-tests:
    name: Frontend Tests (Coverage > 90%)
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Dependencies
      run: cd frontend && npm install --legacy-peer-deps

    - name: Run Component Tests
      run: cd frontend && npm run test:ci

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: frontend-coverage
        path: frontend/coverage/
        retention-days: 15

  playwright-e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Dependencies
      run: cd frontend && npm install --legacy-peer-deps

    - name: Install Playwright Browsers
      run: cd frontend && npx playwright install --with-deps

    - name: Build Frontend
      run: cd frontend && npm run build
      env:
        NODE_ENV: production

    - name: Run Playwright Tests
      run: cd frontend && npx playwright test
      env:
        CI: true

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 15

  security-scan:
    name: Security Analysis (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
    - uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: javascript-typescript

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Audit Backend Dependencies
      run: cd backend && npm audit --audit-level=high || true

    - name: Audit Frontend Dependencies
      run: cd frontend && npm audit --audit-level=high || true

  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install & Build Frontend
      run: |
        cd frontend
        npm install --legacy-peer-deps
        npm run build
      env:
        NODE_ENV: production

    - name: Install & Build Backend
      run: |
        cd backend
        npm install --legacy-peer-deps
        npx tsc --noEmit
